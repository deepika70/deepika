<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% if age < 13 %}
    <h1>{{name}} you are child</h1>
    {% elif age > 13 and age < 18 %}
    <h1>{{age}} well based on your age, you are a teenager, so study hard</h1>
    {% else %}
    <h1>{{name}} congratulations, Now you are in 20's enjoy your life</h1>
    {% endif %}
</body>
</html>
